<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JLPT N4 にほんご れんしゅう</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif; background: #eef2ff; min-height: 100vh; color: #1e293b; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* HOME */
    .home-header { background: linear-gradient(135deg, #1d4ed8, #4f46e5); color: white; padding: 32px 20px 28px; text-align: center; }
    .home-header .flag { font-size: 28px; margin-bottom: 8px; }
    .home-header h1 { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
    .home-header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
    .home-stats { display: flex; justify-content: center; gap: 24px; background: white; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-item { text-align: center; }
    .stat-num { font-size: 28px; font-weight: 900; color: #1d4ed8; }
    .stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }
    .lesson-list { padding: 16px; }
    .lesson-list h2 { font-size: 13px; color: #64748b; margin-bottom: 12px; letter-spacing: 1px; }
    .lesson-card { background: white; border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 2px solid transparent; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .lesson-card:active { transform: scale(0.98); }
    .lesson-card.locked { opacity: 0.5; cursor: default; }
    .lesson-card.completed { border-color: #16a34a; }
    .lesson-card.available { border-color: #1d4ed8; }
    .lesson-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .lesson-card.completed .lesson-icon { background: #dcfce7; }
    .lesson-card.available .lesson-icon { background: #dbeafe; }
    .lesson-card.locked .lesson-icon { background: #f1f5f9; }
    .lesson-info { flex: 1; min-width: 0; }
    .lesson-num { font-size: 11px; color: #64748b; font-weight: 600; }
    .lesson-title { font-size: 14px; font-weight: 700; color: #1e293b; line-height: 1.4; margin-top: 1px; }
    .lesson-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .lesson-badge { flex-shrink: 0; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .badge-done { background: #dcfce7; color: #16a34a; }
    .badge-go { background: #dbeafe; color: #1d4ed8; }
    .badge-lock { background: #f1f5f9; color: #94a3b8; }
    .score-stars { font-size: 13px; margin-top: 4px; }

    /* QUIZ */
    #quiz-screen { min-height: 100vh; background: #eef2ff; }
    .quiz-header { background: white; padding: 14px 16px 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 10; }
    .btn-back-quiz { width: 36px; height: 36px; border: none; background: #f1f5f9; border-radius: 10px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .quiz-title { flex: 1; min-width: 0; }
    .quiz-lesson-name { font-size: 12px; color: #64748b; }
    .quiz-progress-text { font-size: 14px; font-weight: 700; color: #1e293b; }
    .progress-bar-wrap { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin: 10px 16px 0; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #1d4ed8, #4f46e5); border-radius: 3px; transition: width 0.3s ease; }
    .quiz-body { padding: 16px; }
    .section-label { display: inline-block; background: #1d4ed8; color: white; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
    .section-instruction { font-size: 12px; color: #64748b; background: #f8fafc; padding: 10px 12px; border-radius: 10px; margin-bottom: 14px; line-height: 1.6; }
    .question-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 16px; }
    .question-text { font-size: 17px; line-height: 1.7; font-weight: 500; color: #1e293b; margin-bottom: 20px; }
    .underline { text-decoration: underline; text-decoration-color: #1d4ed8; }
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; font-size: 15px; font-family: inherit; color: #1e293b; text-align: left; display: flex; align-items: center; gap: 12px; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .choice-btn:active:not(:disabled) { transform: scale(0.98); }
    .choice-btn .num { width: 28px; height: 28px; border-radius: 50%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #64748b; flex-shrink: 0; }
    .choice-btn:hover:not(:disabled) { border-color: #93c5fd; background: #eff6ff; }
    .choice-btn.correct { border-color: #16a34a; background: #f0fdf4; }
    .choice-btn.correct .num { background: #16a34a; color: white; }
    .choice-btn.wrong { border-color: #dc2626; background: #fef2f2; }
    .choice-btn.wrong .num { background: #dc2626; color: white; }
    .choice-btn.show-correct { border-color: #16a34a; background: #f0fdf4; }
    .choice-btn.show-correct .num { background: #16a34a; color: white; }
    .choice-btn:disabled { cursor: default; }

    /* 選択中の一時ハイライト */
    .choice-btn.selected-answer { border-color: #6366f1; background: #eef2ff; }
    .choice-btn.selected-answer .num { background: #6366f1; color: white; }

    /* 解説レビュー（結果画面） */
    .review-section { width: 100%; max-width: 360px; margin-top: 8px; }
    .review-header { color: white; font-size: 16px; font-weight: 700; margin-bottom: 12px; padding: 0 4px; }
    .review-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 14px; }
    .review-qnum { font-size: 11px; font-weight: 700; color: #6366f1; margin-bottom: 6px; }
    .review-qtext { font-size: 15px; font-weight: 500; color: #1e293b; line-height: 1.6; margin-bottom: 12px; }
    .review-answers { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .review-ans { font-size: 13px; padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
    .review-ans.wrong-ans { background: #fef2f2; color: #991b1b; }
    .review-ans.correct-ans { background: #f0fdf4; color: #166534; }
    .review-exp { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 12px; }
    .review-exp-title { font-size: 11px; font-weight: 700; color: #92400e; margin-bottom: 6px; }
    .review-exp-ja { font-size: 13px; color: #1e293b; line-height: 1.7; margin-bottom: 8px; }
    .review-exp-tl { font-size: 13px; color: #1e40af; background: #eff6ff; border-radius: 8px; padding: 8px 10px; line-height: 1.7; }
    .review-exp-tl-label { font-size: 11px; font-weight: 700; color: #1d4ed8; margin-bottom: 3px; }

    /* RESULT */
    #result-screen { min-height: 100vh; background: linear-gradient(160deg, #1d4ed8 0%, #4f46e5 100%); padding: 40px 20px; flex-direction: column; align-items: center; }
    #result-screen.active { display: flex; }
    .result-emoji { font-size: 64px; margin-bottom: 16px; }
    .result-title { font-size: 24px; font-weight: 900; color: white; margin-bottom: 4px; }
    .result-subtitle { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 32px; }
    .result-card { background: white; border-radius: 24px; padding: 28px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); text-align: center; margin-bottom: 20px; }
    .score-circle { width: 120px; height: 120px; border-radius: 50%; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; border: 6px solid #1d4ed8; }
    .score-num { font-size: 36px; font-weight: 900; color: #1d4ed8; line-height: 1; }
    .score-total { font-size: 13px; color: #64748b; margin-top: 2px; }
    .score-stars-big { font-size: 28px; margin-bottom: 12px; }
    .score-msg { font-size: 16px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .score-msg-sub { font-size: 13px; color: #64748b; }
    .result-breakdown { width: 100%; max-width: 360px; background: rgba(255,255,255,0.15); border-radius: 16px; padding: 16px; margin-bottom: 24px; }
    .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.15); color: white; font-size: 13px; }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-ok { color: #86efac; font-weight: 700; }
    .breakdown-ng { color: #fca5a5; font-weight: 700; }
    .result-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; }
    .btn-retry, .btn-home, .btn-next-lesson { padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; border: none; -webkit-tap-highlight-color: transparent; }
    .btn-next-lesson { background: white; color: #1d4ed8; }
    .btn-retry { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.4); }
    .btn-home { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
    /* NAME INPUT SCREEN */
    #name-screen { flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 20px; background: linear-gradient(135deg, #1d4ed8, #4f46e5); }
    #name-screen.active { display: flex; }
    .name-card { background: white; border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .name-icon { font-size: 48px; margin-bottom: 16px; }
    .name-title { font-size: 20px; font-weight: 900; color: #1e293b; margin-bottom: 6px; }
    .name-sub { font-size: 13px; color: #64748b; margin-bottom: 24px; line-height: 1.6; }
    .name-input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-family: inherit; outline: none; transition: border-color 0.2s; margin-bottom: 8px; }
    .name-input:focus { border-color: #4f46e5; }
    .name-input-label { font-size: 11px; color: #64748b; text-align: left; margin-bottom: 16px; display: block; }
    .btn-name-start { width: 100%; padding: 16px; background: linear-gradient(135deg, #1d4ed8, #4f46e5); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 8px; }
    .btn-name-skip { width: 100%; padding: 12px; background: none; color: #94a3b8; border: none; font-size: 13px; font-family: inherit; cursor: pointer; margin-top: 4px; }
    .save-status { font-size: 12px; color: #22c55e; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>

<div id="home-screen" class="screen active">
  <div class="home-header">
    <div class="flag">🇯🇵 🇵🇭</div>
    <h1>JLPT N4 れんしゅう</h1>
    <p>技人国ビザ取得者向け 日本語学習アプリ</p>
  </div>
  <div class="home-stats">
    <div class="stat-item"><div class="stat-num" id="stat-done">0</div><div class="stat-label">かんりょう</div></div>
    <div class="stat-item"><div class="stat-num">8</div><div class="stat-label">ぜんぶ</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-avg">-</div><div class="stat-label">へいきんスコア</div></div>
  </div>
  <div class="lesson-list">
    <h2>レッスン一覧</h2>
    <div id="lesson-cards"></div>
  </div>
  <div style="text-align:center;padding:8px 16px 20px;">
    <span id="current-name-display" style="font-size:13px;color:#64748b;"></span>
    <button onclick="changeName()" style="margin-left:8px;font-size:12px;color:#6366f1;background:none;border:none;cursor:pointer;text-decoration:underline;">名前を変える</button>
  </div>
</div>

<div id="name-screen" class="screen">
  <div class="name-card">
    <div class="name-icon">✏️</div>
    <div class="name-title">なまえを おしえてください</div>
    <div class="name-sub">Pakisulat ang iyong pangalan.<br>スコアを記録するために使います。</div>
    <input type="text" class="name-input" id="learner-name-input" placeholder="例）Maria / 山田 太郎" maxlength="30">
    <span class="name-input-label">※ ニックネームでも OK です</span>
    <button class="btn-name-start" onclick="confirmName()">つぎへ →</button>
    <button class="btn-name-skip" onclick="confirmName(true)">スキップして はじめる</button>
  </div>
</div>

<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <button class="btn-back-quiz" onclick="goHome()">←</button>
    <div class="quiz-title">
      <div class="quiz-lesson-name" id="quiz-lesson-name"></div>
      <div class="quiz-progress-text" id="quiz-progress-text"></div>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div></div>
  <div class="quiz-body" id="quiz-body"></div>
</div>

<div id="result-screen" class="screen">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title">おつかれさまでした！</div>
  <div class="result-subtitle" id="result-subtitle"></div>
  <div class="result-card">
    <div class="score-circle"><div class="score-num" id="result-score-num">0</div><div class="score-total" id="result-score-total">/ 0</div></div>
    <div class="score-stars-big" id="result-stars"></div>
    <div class="score-msg" id="result-msg"></div>
    <div class="score-msg-sub" id="result-msg-sub"></div>
  </div>
  <div class="result-breakdown" id="result-breakdown"></div>
  <div class="save-status" id="save-status"></div>
  <div class="result-btns">
    <button class="btn-next-lesson" id="btn-next-lesson" onclick="nextLesson()">つぎの レッスンへ →</button>
    <button class="btn-retry" onclick="retryLesson()">もう いちど やる 🔄</button>
    <button class="btn-home" onclick="goHome()">ホームに もどる 🏠</button>
  </div>
  <div class="review-section" id="review-section"></div>
</div>

<script>
const PROXY_URL = './proxy.php';
let learnerName = localStorage.getItem('learnerName') || '';
let pendingLessonId = null;

const LESSONS = [
  {
    id:1, title:"私・家族・私の国の紹介", subtitle:"Introducing yourself, family and country", icon:"👋",
    questions:[
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"わたしは 日本の えいがに （　） が あります。",c:["きょうみ","しょうせつ","せいさん","ちから"],a:0,
       exp:{ja:"「きょうみ（興味）」は「すきで、もっと しりたい きもち・interest」という いみです。②しょうせつ＝小説（novel）、③せいさん＝生産（production）、④ちから＝力（power）は この ぶんに あいません。",
            tl:"Ang 'kyoumi (興味)' ay nangangahulugang interes. 'Eiga ni kyoumi ga aru' = interesado sa pelikula. Ang ibang mga salita ay hindi angkop sa pangungusap."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"わたしの （　） は しょうせつを 読む ことです。",c:["せいかつ","しつもん","しゅみ","やすみ"],a:2,
       exp:{ja:"「しゅみ（趣味）」は「すきで よく すること・hobby」という いみです。「しゅみは〜することです」は よく つかう いいかたです。①せいかつ＝生活（daily life）、②しつもん＝質問（question）、④やすみ＝休み（day off）は あいません。",
            tl:"Ang 'shumi (趣味)' ay nangangahulugang libangan o hobby. 'Shumi wa ~ koto desu' = Ang aking hobby ay ~. Ito ang karaniwang parirala sa pagpapakilala ng sarili."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"わたしは ちかくの 店で （　） を して います。",c:["アルバイト","エレベーター","コーヒー","レストラン"],a:0,
       exp:{ja:"「アルバイト」は「パートタイムの しごと・part-time job」という いみです。「みせで アルバイトを する」は「おみせで はたらく」という いみです。",
            tl:"Ang 'arubaito' ay part-time na trabaho. Galing ito sa salitang Aleman na 'Arbeit'. 'Mise de arubaito wo suru' = nagtatrabaho part-time sa tindahan."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"わたしの 国は 日本と （　） を して います。",c:["かいもの","ぼうえき","ゆにゅう","りょこう"],a:1,
       exp:{ja:"「ぼうえき（貿易）」は「くにと くにの あいだで ものを うったり かったり すること・trade」という いみです。③ゆにゅう＝輸入（import）は「〜と ゆにゅうを する」とは いいません。",
            tl:"Ang 'boueki (貿易)' ay internasyonal na kalakalan sa pagitan ng mga bansa (trade). 'Nihon to boueki wo suru' = nakikipagkalakalan sa Japan. Hindi 'kaimono' (pamimili) o 'ryokou' (turismo)."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"おとうとは <u>のりものが すきです</u>。",c:["おとうとは テニスや サッカーが すきです。","おとうとは バスや 電車が すきです。","おとうとは パンや ごはんが すきです。","おとうとは 本や ざっしが すきです。"],a:1,
       exp:{ja:"「のりもの（乗り物）」は「バス・電車（でんしゃ）・ひこうきなど、ひとが のって いどうする もの・vehicle」という いみです。②「バスや でんしゃ」は どちらも のりものなので、せいかいです。①は スポーツ、③は たべもの、④は 本（ほん）・ざっしです。",
            tl:"Ang 'norimono (乗り物)' ay sasakyan tulad ng bus, tren, eroplano atbp. Ang ②'basu ya densha' (bus at tren) ay parehong sasakyan, kaya ito ang tamang sagot."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"<u>あなたの ゆめは 何ですか</u>。",c:["あなたが いつか やりたい ことは 何ですか。","あなたが 今 こまって いる ことは 何ですか。","あなたが たいせつに して いる ものは 何ですか。","あなたが ひまな とき よく する ことは 何ですか。"],a:0,
       exp:{ja:"「ゆめ（夢）」は「しょうらい じつげんしたいこと・dream/goal」という いみです。「いつか やりたいこと＝しょうらいの ゆめ」なので、①が せいかいです。②は こまっていること、③は たいせつな もの、④は しゅみの しつもんです。",
            tl:"Ang 'yume (夢)' ay pangarap para sa hinaharap. 'Itsu ka yaritai koto' (bagay na nais gawin someday) = kahulugang katulad ng pangarap. Kaya ang ① ang tamang sagot."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「しょうらい」",c:["この ページの かんじの テストは しょうらい あります。","日本語の しゅくだいは しょうらい します。","むすめは しょうらい 学校から かえって きます。","わたしは しょうらい 学校の 先生に なりたいです。"],a:3,
       exp:{ja:"「しょうらい（将来）」は「これからの みらい・future」という いみです。ゆめや もくひょうを はなすときに つかいます。④「しょうらい、先生（せんせい）に なりたい」が いちばん しぜんな つかいかたです。①②③は ちかい みらい（きょう・あした）の はなしで「しょうらい」は つかいません。",
            tl:"Ang 'shourai (将来)' ay nangangahulugang malayong hinaharap o kinabukasan. Ginagamit ito para sa mga pangarap o layunin. Ang ④'shourai, sensei ni naritai' = nais maging guro sa hinaharap, ang pinakanatural na gamit."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",

       q:"となりの いえの おじいさんが <u>なくなりました</u>。",c:["となりの いえの おじいさんが 言いました。","となりの いえの おじいさんが 聞きました。","となりの いえの おじいさんが しにました。","となりの いえの おじいさんが 出かけました。"],a:2,
       exp:{ja:"「なくなる（亡くなる）」は「しぬ（死ぬ）」の ていねいな いいかたです。「なくなりました」は「しにました」より ていねいで、そうしきや おくやみの ばめんで よく つかわれます。にほんごでは「しぬ」より「なくなる」の ほうが れいぎただしい いいかたです。",
            tl:"Ang 'nakunaru (亡くなる)' ay magalang na paraan ng pagsasabi ng 'shinu (死ぬ)' = mamatay. Ang 'nakunarimashita' ay mas magalang at ginagamit sa libing o pagpapahayag ng pakikiramay. Mas magalang kaysa 'shinimashita'."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「るす」",c:["雨と かぜが つよくて、学校が るすに なりました。","ゆうびんきょくが るすだったので、きっては 買えませんでした。","先生の いえを たずねましたが、るすでした。","新しい びじゅつかんに 行きましたが、るすでした。"],a:2,
       exp:{ja:"「るす（留守）」は「いえの ひとが いない・not home/nobody home」という いみです。③「先生（せんせい）の いえを たずねたが、るすだった」＝「先生が いえに いなかった」が ただしい つかいかたです。がっこう・ゆうびんきょく・びじゅつかんは「るす」に なりません。",
            tl:"Ang 'rusu (留守)' ay nangangahulugang wala sa bahay (nobody home). '先生の家を訪ねたが、留守でした' = Pumunta sa bahay ng guro ngunit wala siya. Hindi ito ginagamit para sa paaralan, post office, o museum."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「さいきん」",c:["さいきん じゅぎょうが はじまるので、きょうしつへ 行きましょう。","さいきん いっしょに えいがを 見に 行きませんか。","さいきん かえって きたので、まだ 何も 食べて いません。","さいきん 子どもが まじめに べんきょうしないので、しんぱいです。"],a:3,
       exp:{ja:"「さいきん（最近）」は「このごろ・lately/recently」という いみで、さいきんの へんかや じょうきょうを あらわします。④「さいきん、こどもが まじめに べんきょうしない」→さいきんの こどもの へんかを あらわす ぶんが いちばん しぜんです。①②は みらいや ていあんの ぶんで「さいきん」は つかいません。",
            tl:"Ang 'saikin (最近)' ay nangangahulugang kamakailan o lately/recently. Pinaka-natural ang ④'saikin kodomo ga majime ni benkyou shinai' = kamakailan, hindi sineseryoso ng bata ang pag-aaral. Nagpapakita ng bagong pagbabago."}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"友だちが <u>有名な</u> テレビばんぐみに 出ました。",c:["ゆうめ","ゆうめい","ゆめ","ゆめい"],a:1,
       exp:{ja:"「有名（ゆうめい）」の ただしい よみかたです。「有（ゆう）」＋「名（めい）」＝「ゆうめい」。「ゆうめ」「ゆめ」「ゆめい」は ぜんぶ まちがいです。「夢（ゆめ）」は ぜんぜん べつの かんじ・べつの ことばです。",
            tl:"Ang tamang pagbasa ng '有名' ay 'yuumei' na nangangahulugang sikat o bantog (famous). '有 = yuu', '名 = mei'. Lahat ng ibang pagbasa ay mali. Huwag malito sa '夢 (yume)' = pangarap - ibang kanji ito!"}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"あには <u>去年</u> けっこんしました。",c:["きょうねん","きょねん","きゅうねん","きゅねん"],a:1,
       exp:{ja:"「去年（きょねん）」の ただしい よみかたです。「去（きょ）」＋「年（ねん）」＝「きょねん」。「きょうねん」は まちがいです（「去」は「きょ」で「きょう」では ありません）。ことし＝今年（ことし）、らいねん＝来年（らいねん）、きょねん＝去年（きょねん）。",
            tl:"Ang tamang pagbasa ng '去年' ay 'kyonen' na nangangahulugang nakaraang taon (last year). '去 = kyo (HINDI kyou)', '年 = nen'. 'Kyounen' ay MALI. Taon: 今年 (kotoshi) = ngayong taon, 来年 (rainen) = susunod na taon, 去年 (kyonen) = nakaraang taon."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"そぼは まいあさ こうえんを 1時間 <u>あるいて</u> います。",c:["足いて","歩いて","走いて","元いて"],a:1,
       exp:{ja:"「歩く（あるく）」の て形は「歩いて（あるいて）」です。かんじは「歩（あるく）」です。「足いて・走いて・元いて」という ひょうげんは ありません。「走る（はしる）→はしって」「泳ぐ（およぐ）→およいで」と くべつしましょう。",
            tl:"Ang te-form ng 'aruku (歩く)' = maglakad ay 'aruite (歩いて)'. Ang tamang kanji ay '歩'. Ang '足いて', '走いて', '元いて' ay hindi umiiral. 'Hashiru (走る)' = tumakbo → 'hashitte'."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"うちの <u>ちかくに</u> 新しい スーパーが できました。",c:["辺く","近く","返く","遠く"],a:1,
       exp:{ja:"「近く（ちかく）」の かんじは「近」です。「近い（ちかい）」の めいしけいです。はんたいの ことばは「遠く（とおく）・far away」。「辺く・返く」という かんじの ことばは ありません。",
            tl:"Ang tamang kanji ng 'chikaku' ay '近く' na nangangahulugang malapit. '遠く (tooku)' = malayo (kabaligtaran). Ang '辺く' at '返く' ay hindi umiiral sa Japanese."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"あねは このごろ げんきが ないので、<u>しんぱい</u>です。",c:["心配","化配","父配","必配"],a:0,
       exp:{ja:"「心配（しんぱい）」は「こころが おちつかない・worried/anxious」という いみです。「心（こころ）」は こころ・heart、「配（はい）」は くばる・arrange。「化配・父配・必配」という かんじの くみあわせは ありません。",
            tl:"Ang tamang kanji ng 'shinpai' ay '心配' na nangangahulugang nag-aalala (worried). '心 = puso/kalooban', '配 = ipamahagi'. Ang '化配', '父配', '必配' ay hindi umiiral bilang salita sa Japanese."}},
    ]
  },
  {
    id:4, title:"プレゼントをあげましょう", subtitle:"Giving gifts", icon:"🎁",
    questions:[
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"みんなで （　） して、先生に 花を プレゼントしました。",c:["しょうたい","そうだん","ぼうえき","りょうり"],a:1,
       exp:{ja:"「そうだん（相談）」は「みんなで はなしあって きめること・to discuss/consult」です。「みんなで そうだんして〜した」は「together we discussed」という いみです。①しょうたい＝招待（しょうたい・invite）、③ぼうえき＝貿易（ぼうえき）、④りょうり＝料理（りょうり・cooking）は あいません。",
            tl:"Ang 'soudan (相談)' ay nangangahulugang pag-usapan o kumonsulta. 'Minna de soudan shite' = pinag-usapan ng lahat at nagpasya. 'Shoutai' = mag-imbita, 'boueki' = kalakalan, 'ryouri' = pagluluto."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"友だちの けっこんの （　） に 何を あげますか。",c:["アイディア","おいわい","おれい","たんじょうび"],a:1,
       exp:{ja:"「おいわい（お祝い）」は「おめでたいことを おいわいする おくりもの・celebration/congratulatory gift」という いみです。「けっこんの おいわい」は「wedding celebration gift」です。③おれい＝お礼（おれい・thank-you gift）は けっこんいわいとは ちがいます。",
            tl:"Ang 'oiwai (お祝い)' ay regalo o pagbati para sa espesyal na okasyon. 'Kekkon no oiwai' = regalo para sa kasal (wedding gift). 'Orei (お礼)' = pasasalamat, 'tanjoubi (誕生日)' = kaarawan - iba ang okasyon."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"けっこんしきに だれを （　） しますか。",c:["しょうかい","しょうたい","せいさん","そうだん"],a:1,
       exp:{ja:"「しょうたい（招待）」は「パーティーや ぎょうじに きて ほしい ひとを さそうこと・to invite」という いみです。「けっこんしきに〜を しょうたいする」が しぜんです。①しょうかい＝紹介（しょうかい・introduce）と まちがえやすいので きをつけましょう！「しょうかい」は ひとを あわせること、「しょうたい」は きてもらうことです。",
            tl:"Ang 'shoutai (招待)' ay nangangahulugang mag-imbita. 'Kekkonsiki ni shoutai suru' = imbitahan sa kasal. Mag-ingat sa pagkalito sa '紹介 (shoukai)' = pagpapakilala ng tao sa isa't isa - iba ang kahulugan!"}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"子どもは すきな おかしを もらって、（　） いました。",c:["さしあげて","たのんで","つくって","よろこんで"],a:3,
       exp:{ja:"「よろこぶ（喜ぶ）」は「うれしくて、しあわせな ようす・to be happy/joyful」という いみです。すきな おかしを もらった→よろこんでいた、という ながれが しぜんです。①さしあげて＝あげる（ていねいご）、②たのんで＝頼んで（request）、③つくって＝作って（make）は あいません。",
            tl:"Ang 'yorokobu (喜ぶ)' ay nangangahulugang masaya o natutuwa. Natural na matuwa ang bata kapag nakatanggap ng paboritong kendi. 'Sashiagete' = ibigay (magalang), 'tanonde' = humiling, 'tsukutte' = gumawa - hindi angkop."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"<u>おれいを 言いました</u>。",c:["「ありがとう」と 言いました。","「おめでとう」と 言いました。","「ごめんなさい」と 言いました。","「さようなら」と 言いました。"],a:0,
       exp:{ja:"「おれい（お礼）を いう」は「ありがとうと いう・to say thank you」という いみです。①「ありがとう」が せいかいです。②「おめでとう」＝congratulations、③「ごめんなさい」＝apology、④「さようなら」＝goodbye で ぜんぶ ちがいます。",
            tl:"Ang 'orei wo iu (お礼を言う)' ay sabihing salamat (to say thank you). 'Arigatou to iimashita' = sinabi ng salamat - ito ang tamang sagot. 'Omedetou' = congratulations, 'gomen nasai' = patawad, 'sayounara' = paalam."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"父が しょうせつを <u>くれました</u>。",c:["父に しょうせつを あげました。","父に しょうせつを かしました。","父に しょうせつを かりました。","父に しょうせつを もらいました。"],a:3,
       exp:{ja:"「くれる」は「ほかの ひと→わたしへの プレゼント（give to me）」、「もらう」は「わたしが うけとること（I receive）」です。どちらも「ちち→わたし」という ほうこうで おなじ いみに なります。「あげる」は「わたし→ほかの ひと（I give）」で ぎゃくほうこうです。",
            tl:"Ang 'kureru' (ibinibigay sa akin) at 'morau' (tinatanggap ko) ay parehong nagpapakita ng direksyon na TATAY → AKO. 'Chichi ga hon wo kureta' = 'Chichi ni hon wo moratta' = Nakatanggap ng libro mula sa tatay. 'Ageru' = AKO ang nagbibigay sa iba."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「足りる」",c:["一週間前に 出した てがみが まだ 足りて いません。","おくりものを 買いに 行きましたが、お金が 足りませんでした。","はしりましたが、パーティーが はじまる 時間に 足りませんでした。","店は かいものを する 人が 足りて いて、入れませんでした。"],a:1,
       exp:{ja:"「足りる（たりる）」は「ひつような りょうが ある・enough/sufficient」という いみです。②「おかねが たりない」は「おかねが すくなくて たりない・not enough money」で いちばん しぜんな つかいかたです。①「てがみが たりていない」③「じかんに たりない」は にほんごとして ふしぜんです。",
            tl:"Ang 'tariru (足りる)' ay nangangahulugang sapat o enough. 'Okane ga tarimasen deshita' = hindi sapat ang pera. Ito ang pinakanatural na gamit. Ang ①③ ay hindi natural na Japanese. Ang ④ ay kabaligtaran ng tamang kahulugan."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「いただく」",c:["あにが わたしに 新しい かばんを いただきました。","先生に すてきな ハンカチを いただきました。","先生の たんじょうびに みんなで てがみを いただきました。","友だちが いえを 買ったので、おいわいに 花を いただきました。"],a:1,
       exp:{ja:"「いただく（頂く）」は「もらう」の ていねいごで、めうえの ひと（先生・じょうし）から もらうときに つかいます。②「先生に ハンカチを いただいた」が ただしい つかいかたです。①あにから（めうえでない ばあいは ふしぜん）、③先生に あげるのに「いただく」は ぎゃく、④ともだちに おいわいを「いただく」は ほうこうが ぎゃくです。",
            tl:"Ang 'itadaku (頂く)' ay magalang na paraan ng 'morau' (tumanggap). Ginagamit ito kapag tumatanggap mula sa taong mas mataas ang katayuan tulad ng guro o boss. 'Sensei ni itadaita' = nakatanggap mula sa guro (tamang direksyon at paggamit)."}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"むすこの すきな <u>物</u>を プレゼントします。",c:["くるま","はな","ほん","もの"],a:3,
       exp:{ja:"「物（もの）」は「thing・もの」という よみかたです。①くるま＝車（car）、②はな＝花（flower）、③ほん＝本（book）とは ちがいます。「物（もの）」は ひろい いみの「もの」です。",
            tl:"Ang '物' ay binabasa bilang 'mono' na nangangahulugang bagay o object (thing). Hindi ito 'kuruma (車)' = kotse, 'hana (花)' = bulaklak, o 'hon (本)' = libro. '物 (mono)' ay pangkaraniwang salita para sa anumang bagay."}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"あには <u>黒</u>が すきです。",c:["あお","あか","くろ","しろ"],a:2,
       exp:{ja:"「黒（くろ）」は くろいろ・blackの よみかたです。いろの きほん：青（あお）＝blue、赤（あか）＝red、白（しろ）＝white、黒（くろ）＝black、黄（き）＝yellow、緑（みどり）＝green。いろの かんじと よみかたを おぼえましょう！",
            tl:"Ang '黒' ay binabasa bilang 'kuro' na nangangahulugang itim (black). Mga kulay: 青(ao)=asul, 赤(aka)=pula, 白(shiro)=puti, 黒(kuro)=itim, 黄(ki)=dilaw, 緑(midori)=berde. Importante na memorahin ang mga ito!"}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"あねに もらった セーターを <u>きて</u> います。",c:["青て","差て","書て","着て"],a:3,
       exp:{ja:"「着る（きる）」の て形は「着て（きて）」です。「着（きる）」は「ふくを きる・to wear/put on」という いみです。「きる」は うえに きるもの（シャツ・コート・セーターなど）に つかいます。「はく（履く）」は ズボン・くつなどです。",
            tl:"Ang te-form ng 'kiru (着る)' = magsuot ay 'kite (着て)'. Ang '着' ay nangangahulugang magsuot ng damit. 'Kiru' ay ginagamit para sa damit sa itaas (shirt, jacket, sweater). 'Haku (履く)' ay para sa pantalon at sapatos."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"りょうりを つくって、みんなが 来るのを <u>まちました</u>。",c:["待ちました","持ちました","討ちました","特ちました"],a:0,
       exp:{ja:"「待つ（まつ）」の かんじは「待（ま）つ」です。「待ちました（まちました）」は「waited」という いみです。「持つ（もつ）」は「hold/carry」で ちがう いみです。よみかたも いみも ちがうので ちゅういしましょう。",
            tl:"Ang tamang kanji ng 'machimashita' ay '待ちました' mula sa 'matsu (待つ)' = maghintay (to wait). '持つ (motsu)' = hawakan o dalhin (to hold/carry) - ibang kahulugan! Ang '討つ' at '特' ay ganap na iba."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"新しい <u>ふく</u>が 買いたいです。",c:["彼","役","服","股"],a:2,
       exp:{ja:"「服（ふく）」は「いふく・clothes/clothing」という いみです。「あたらしい ふくを かいたい」が しぜんな ぶんです。①彼（かれ）＝he/him、②役（やく）＝role/use、④股（また）＝crotch/thigh で ぜんぜん いみが ちがいます。",
            tl:"Ang tamang kanji ng 'fuku' ay '服' na nangangahulugang damit (clothes). 'Atarashii fuku ga kaitai' = gusto kong bumili ng bagong damit. '彼 (kare)' = siya (lalaki), '役 (yaku)' = papel/gamit, '股 (mata)' = pantay ng hita - ganap na ibang kahulugan."}},
    ]
  },
  {id:5,title:"学校について 話しましょう",subtitle:"Talking about school",icon:"🏫",locked:false,
    questions:[
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"つぎの テストで 80てん（　）とりたいです。",c:["いじょう","から","ごろ","すぎ"],a:0,
       exp:{ja:"「いじょう（以上）」は「〜より おおきい かず・80点 or more」という いみです。「80てんいじょう とりたい」は「80てん か、それより おおい てんを とりたい」という いみです。②から＝from（はじまりの てん）、③ごろ＝about/around（だいたいの じかん）、④すぎ＝past/too much（こえること）は ちがいます。",
            tl:"Ang 'ijou (以上)' ay nangangahulugang 80 puntos o higit pa. '80-ten ijou toritai' = gusto makakuha ng 80 o mas mataas. ②kara = mula sa, ③goro = mga ganun, ④sugi = labis/lagpas - iba ang kahulugan."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"学校が とおいので、まいあさ（　）はやく うちを 出ます。",c:["とうとう","なるべく","ひさしぶりに","やっと"],a:1,
       exp:{ja:"「なるべく」は「できるだけ・as much as possible」という いみです。「なるべく はやく」は「できるだけ はやく」という いみです。①とうとう＝finally（ながい じかんの あとで）、③ひさしぶりに＝after a long time（ひさびさ）、④やっと＝finally/barely（くろうの あとで）は ちがいます。",
            tl:"Ang 'narubeku' ay nangangahulugang 'hanggang kaya/as much as possible'. 'Narubeku hayaku' = bilisan hanggang kaya. ①toutou = sa wakas (pagkatapos ng matagal), ③hisashiburi ni = pagkatapos ng matagal, ④yatto = kahirap-hirap na sa wakas."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"59に 41を（　）と、100に なります。",c:["いれる","たす","とる","ひく"],a:1,
       exp:{ja:"「たす（足す）」は「かずを あわせること・to add」という いみです。「59＋41＝100」は「たし算（たしざん・addition）」です。①いれる＝to put in、③とる＝to take、④ひく＝to subtract（ひき算・ひきざん）は ちがいます。",
            tl:"Ang 'tasu (足す)' ay nangangahulugang dagdagan o add. '59 + 41 = 100' - tashizan (addition). ①ireru = ilagay, ③toru = kunin, ④hiku = ibawas (hikuzan/subtraction) - iba ang kahulugan."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"ゆうめいな 先生の（　）を 聞きました。",c:["こうぎ","べんきょう","しょうたい","にゅうがくしき"],a:0,
       exp:{ja:"「こうぎ（講義）」は「せんせいが がくせいに おしえる はなし・lecture」という いみです。「ゆうめいな せんせいの こうぎを きく」は「famous teacher's lecture」という いみです。②べんきょう＝study（じぶんで する）、③しょうたい＝invitation、④にゅうがくしき＝entrance ceremony は ちがいます。",
            tl:"Ang 'kougi (講義)' ay nangangahulugang lektura ng guro. 'Yuumei na sensei no kougi wo kiku' = makinig ng lektura ng sikat na guro. ②benkyou = pag-aaral (sariling ginagawa), ③shoutai = imbitasyon, ④nyuugakushiki = seremonya ng pasukan."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"<u>いっしょうけんめい れんしゅうします。</u>",c:["あさから ばんまで れんしゅうします。","じぶんの ちからを ぜんぶ 出して れんしゅうします。","長い 時間を つかって れんしゅうします。","ひさしぶりに れんしゅうします。"],a:1,
       exp:{ja:"「いっしょうけんめい（一生懸命）」は「ちからを ぜんぶ つかって がんばること・with all one's effort」という いみです。「じぶんの ちからを ぜんぶ だして れんしゅうする」が いちばん ちかい いみです。①は じかんの はなし、③は ながさの はなし、④は ひさしぶりの はなしで ちがいます。",
            tl:"Ang 'isshoukenmei (一生懸命)' ay nangangahulugang buong-pusong pagsubok o with all one's effort. 'Jibun no chikara wo zenbu dashite' = ilabas ang lahat ng lakas mo. ①buong araw, ③matagal na oras, ④pagkatapos ng matagal - iba ang kahulugan."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"<u>せんぱいに 学校の ことを うかがいました。</u>",c:["せんぱいに 学校の ことを おしえました。","せんぱいに 学校の ことを 聞きました。","せんぱいに 学校の ことを こたえました。","せんぱいに 学校の ことを 話しました。"],a:1,
       exp:{ja:"「うかがう（伺う）」は「きく（聞く）」の ていねいごです。めうえの ひとに しつもんする ときに つかいます。「せんぱいに きいた」と おなじ いみです。①は おしえた（ぎゃく）、③は こたえた（ぎゃく）、④は はなした（べつの いみ）で ちがいます。",
            tl:"Ang 'ukagau (伺う)' ay magalang na paraan ng 'kiku (聞く)' = magtanong. Ginagamit ito sa nakatatanda. 'Senpai ni kiita' = pareho ang kahulugan. ①nagturo (kabaligtaran), ③sumagot (kabaligtaran), ④nagsalita (iba ang kahulugan)."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「とうとう」",c:["じゅぎょうが はじまりますから、とうとう きょうしつに 行きましょう。","つぎの バスが 来るまで とうとう まって ください。","何時間も まちましたが、たなかさんは とうとう 来ませんでした。","毎日 日本語を べんきょうすると、とうとう じょうずに なりますよ。"],a:2,
       exp:{ja:"「とうとう」は「ながい じかんや どりょくの あとで、ついに そうなった・finally/at last（often negative result）」という いみです。③「なんじかんも まったが、とうとう こなかった」は「ずっと まったが、けっきょく こなかった」という いみで せいかいです。①は「すぐ」がただしい、②は「ずっと」がただしい、④は「だんだん」がただしいです。",
            tl:"Ang 'toutou' ay nangangahulugang 'sa wakas' pagkatapos ng matagal na paghihintay (madalas negatibo). ③'Nanjikan mo matta ga, toutou konakatta' = naghintay ng matagal pero hindi pa rin dumating - ito ang tamang gamit. ①dapat 'sugu', ②dapat 'zutto', ④dapat 'dandan'."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「だから」",c:["学校を 休みました。だから かぜを ひいたからです。","しゅくだいが たくさん あります。だから 今日は あそびません。","なんかいも 書いたり 読んだり しました。だから わすれました。","まいあさ おきて かおを あらいます。だから コーヒーを 飲みます。"],a:1,
       exp:{ja:"「だから」は「りゆう→けっか・so/therefore」という いみで、まえの ぶんが りゆうに なります。②「しゅくだいが たくさん ある（りゆう）→だから あそばない（けっか）」が ただしい つかいかたです。①は「〜から」と ダブルに なって おかしい、③は ながれが ぎゃく、④は つながりが おかしいです。",
            tl:"Ang 'dakara' ay nangangahulugang 'kaya/therefore' - ang unang pangungusap ay dahilan, ang ikalawa ay resulta. ②'Maraming homework, kaya hindi lalaro ngayon' - tama ito. ①dalawang dahilan (double), ③kabaligtaran ang daloy, ④walang koneksyon."}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"子どもの <u>教育</u>に ついて、話しました。",c:["きゅいく","きょいく","きゅういく","きょういく"],a:3,
       exp:{ja:"「教育（きょういく）」の ただしい よみかたです。「教（きょう）」＋「育（いく）」＝「きょういく」。「教」は「きょう」と よみます（「きゅう」では ありません）。「きょういく＝education」。「教える（おしえる）」と いう かんじと おなじです。",
            tl:"Ang tamang pagbabasa ng '教育' ay 'kyouiku'. 'Kyou (教)' + 'iku (育)' = 'kyouiku'. Hindi 'kyuu' kundi 'kyou'. 'Kyouiku' = edukasyon. Ang '教' ay kapareho ng '教える (oshieru)' = magturo."}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"さとうさんは <u>字</u>が きれいです。",c:["じ","こえ","ふく","め"],a:0,
       exp:{ja:"「字（じ）」は「かいた もじ・written character」という いみです。「じが きれい」は「かいた もじが きれい・has beautiful handwriting」という いみです。②こえ＝声（こえ・voice）、③ふく＝服（ふく・clothes）、④め＝目（め・eye）は ぜんぜん ちがいます。",
            tl:"Ang '字 (ji)' ay nangangahulugang nakasulat na titik o karakter. 'Ji ga kirei' = maganda ang sulat-kamay. ②koe = boses, ③fuku = damit, ④me = mata - iba ang kahulugan."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"それ、<u>かりて</u>も いいですか。",c:["借りて","何りて","使りて","待りて"],a:0,
       exp:{ja:"「かりる（借りる）」の かんじは「借（か）りる」です。「借りて も いいですか」は「May I borrow it?」という いみです。「何（なに・なん）」「使（つかう）」「待（まつ）」は ぜんぜん べつの かんじです。",
            tl:"Ang kanji ng 'kariru (借りる)' ay '借'. '借りてもいいですか' = Pwede bang hiramin? '何 (nani)', '使 (tsukau)', '待 (matsu)' ay ganap na magkakaibang kanji."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"その もんだいの <u>こたえ</u>は Aじゃ なくて、Bです。",c:["同え","合え","答え","問え"],a:2,
       exp:{ja:"「こたえ（答え）」の かんじは「答（こた）え」です。「答える（こたえる）」の めいしです。「同（おなじ）」「合（あう）」「問（とう）」は べつの よみかたと いみです。「問（もん）」は しつもん・question、「答（こた）え」は こたえ・answerです。",
            tl:"Ang kanji ng 'kotae (答え)' ay '答'. Pangngalan ng 'kotaeru (答える)' = sumagot. '同 (onaji)' = pareho, '合 (au)' = magkasya, '問 (tou)' = tanong - ganap na magkakaibang kanji."}}
    ]
  },
  {id:6,title:"子供の ころの 思い出に ついて 話しましょう",subtitle:"Talking about childhood memories",icon:"🌸",locked:false,
    questions:[
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"あさ（　）して、じゅぎょうに ちこくしました。",c:["しょうたい","しんぱい","ねぼう","りよう"],a:2,
       exp:{ja:"「ねぼう（寝坊）」は「おきる じかんに おきられないで、おそく まで ねること・to oversleep」という いみです。「ねぼうして ちこくした」は「おそく まで ねて、じゅぎょうに おくれた」という いみです。①しょうたい＝invitation、②しんぱい＝worry、④りよう＝use は ちがいます。",
            tl:"Ang 'nebou (寝坊)' ay nangangahulugang matulog nang higit sa oras o oversleep. 'Nebou shite chikoku shita' = natulog nang matagal kaya nahuli sa klase. ①shoutai = imbitasyon, ②shinpai = alalahanin, ④riyou = paggamit."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"かぞくに「（　）」と 言って、出かけました。",c:["いって まいります","ごめんください","おはよう ございます","しつれいします"],a:0,
       exp:{ja:"「いって まいります」は「いってきます」の ていねいごで、いえを でるときに かぞくに いう あいさつです。「いってきます＝I am going and will return back」の ていねいな いいかたです。②ごめんください＝たずねるとき（ひとの いえに きたとき）、③おはようございます＝morning greeting、④しつれいします＝excuse me は ちがいます。",
            tl:"Ang 'itte mairimasu' ay magalang na 'ittekimasu' - paalam kapag umaalis sa bahay. Ibig sabihin: 'aalis na ako at babalik'. ②gomen kudasai = pagpasok sa bahay ng iba, ③ohayou gozaimasu = magandang umaga, ④shitsurei shimasu = excuse me (kapag aalis)."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"雨の 日は サッカーが できなくて、（　）でした。",c:["ざんねん","すてき","へた","りっぱ"],a:0,
       exp:{ja:"「ざんねん（残念）」は「そうなって ほしくなかった、かなしい きもち・disappointing/unfortunate」という いみです。「サッカーが できなかった→ざんねん」は しぜんな ながれです。②すてき＝wonderful（いい いみ）、③へた＝not good at（うまくない）、④りっぱ＝splendid/impressive は ちがいます。",
            tl:"Ang 'zannen (残念)' ay nangangahulugang nakakadismaya o disappointing. 'Saka ga dekinakatta kara zannen' = hindi nakalaro ng soccer kaya malungkot. ②suteki = kahanga-hanga, ③heta = hindi magaling, ④rippa = kahanga-hanga/maimposante."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"わるい ことを すると、父に きびしく（　）。",c:["いじめられました","しかられました","よろこばれました","ほめられました"],a:1,
       exp:{ja:"「しかる（叱る）」は「わるい ことを した ひとに、おこって いう こと・to scold」という いみです。「わるい ことを した→ちちに しかられた」は しぜんな ながれです。①いじめる＝to bully、③よろこぶ＝to be happy（いい ばめんで つかう）、④ほめる＝to praise（いい ことを した とき）は ちがいます。",
            tl:"Ang 'shikaru (叱る)' ay nangangahulugang pagsabihan o scold. 'Warui koto wo shita kara chichi ni shikarareta' = pinarusahan ng ama dahil sa masamang gawa. ①ijimeru = manggulyo, ③yorokobu = masaya (positibong sitwasyon), ④homeru = purihin (nang magandang ginawa)."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"<u>子どもの とき、すいえいが すきでした。</u>",c:["子どもの とき、およぐのが すきでした。","子どもの とき、しゃしんを とるのが すきでした。","子どもの とき、みんなで うたうのが すきでした。","子どもの とき、山に のぼるのが すきでした。"],a:0,
       exp:{ja:"「すいえい（水泳）」は「およぐ スポーツ・swimming」という いみです。「すいえいが すき＝およぐのが すき」で いみが おなじです。②しゃしんを とる＝photography、③みんなで うたう＝singing、④山に のぼる＝hiking は ちがいます。",
            tl:"Ang 'suiei (水泳)' ay nangangahulugang swimming. 'Suiei ga suki = oyogu no ga suki' - pareho ang kahulugan. ②pagkuha ng litrato, ③pagkanta ng lahat, ④pag-akyat ng bundok - iba ang kahulugan."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"<u>だれでも りようする ことが できます。</u>",c:["だれでも 買う ことが できます。","だれでも つかう ことが できます。","だれでも つくる ことが できます。","だれでも もらう ことが できます。"],a:1,
       exp:{ja:"「りよう（利用）する」は「つかう・to use/utilize」と ほぼ おなじ いみです。「だれでも りようできる＝だれでも つかえる」で いみが おなじです。①かう＝buy、③つくる＝make、④もらう＝receive は ちがいます。",
            tl:"Ang 'riyou suru (利用する)' ay halos kapareho ng 'tsukau' = gamitin/utilize. 'Dare demo riyou dekiru = dare demo tsukaeru' - pareho ang kahulugan. ①bumili, ③gumawa, ④matanggap - iba ang kahulugan."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「わけ」",c:["先生に しゅくだいを しなかった わけを 聞かれました。","としょかんの つかいかたに ついて、先生が わけを しました。","ゆうべは わけが わるくて、パーティーに 行けませんでした。","りょこうは どこが いいか、みんなで わけを 出しましょう。"],a:0,
       exp:{ja:"「わけ（訳）」は「りゆう・reason/cause」という いみです。「しゅくだいを しなかった わけを きかれた」は「なぜ しゅくだいを しなかったか、その りゆうを きかれた」という いみです。②は「せつめい（説明）」がただしい、③は「ぐあい（具合）」がただしい、④は「あん（案）」がただしいです。",
            tl:"Ang 'wake (訳)' ay nangangahulugang dahilan o rason. 'Shukudai wo shinakatta wake wo kikareta' = tinanong kung bakit hindi ginawa ang homework. ②dapat 'setsumei' (paliwanag), ③dapat 'guai' (kondisyon), ④dapat 'an' (mungkahi)."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「はずかしい」",c:["あの 先生は いつも はずかしいですが、ほんとうは やさしいです。","おおぜいの 人の 前で 話すのは はずかしいです。","エアコンを つけると、へやが はずかしく なります。","だいすきな 友だちが ひっこしを して、とても はずかしいです。"],a:1,
       exp:{ja:"「はずかしい（恥ずかしい）」は「ひとに みられて、かおが あかくなる きもち・embarrassed/shy」という いみです。「おおぜいの まえで はなす→はずかしい」は しぜんです。①は「きびしい（厳しい）」がただしい、③は「すずしく（涼しく）」がただしい、④は「さびしい」がただしいです。",
            tl:"Ang 'hazukashii (恥ずかしい)' ay nangangahulugang mahiyang o embarrassed. 'Maraming tao sa harapan kaya mahiyang magsalita' - natural ito. ①dapat 'kibishii' (mahigpit), ③dapat 'suzushiku' (malamig), ④dapat 'sabishii' (nag-iisa/malungkot)."}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"ちかくに プールが あるので <u>便利</u>です。",c:["べんい","べんき","べんし","べんり"],a:3,
       exp:{ja:"「便利（べんり）」の ただしい よみかたです。「便（べん）」＋「利（り）」＝「べんり」。「べんり」は「つかいやすくて、らく・convenient/handy」という いみです。「べんい」「べんき」「べんし」は にほんごに ないことばです。",
            tl:"Ang tamang pagbabasa ng '便利' ay 'benri'. 'Ben (便)' + 'ri (利)' = 'benri'. Ibig sabihin: madaling gamitin o convenient. 'Benki', 'benshi', 'beni' - hindi ito mga salita sa Hapon."}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"子どもの とき、<u>日記</u>を 書く しゅうかんが ありました。",c:["にちき","にちぎ","にっき","にっぎ"],a:2,
       exp:{ja:"「日記（にっき）」の ただしい よみかたです。「日（にっ）」＋「記（き）」＝「にっき」。「日」は「にち」と よみますが、つぎに「記」が くると「にっ」と ちいさい「っ」に なります（促音・そくおん）。「日記」は「まいにちの できごとを かいた もの・diary」です。",
            tl:"Ang tamang pagbabasa ng '日記' ay 'nikki'. '日 (nichi)' + '記 (ki)' = 'nikki'. Kapag '日' ay sinundan ng 'ki', nagiging 'nik-' (may maliit na 'tsu/っ' sound). 'Nikki' = diary - ang isinusulat araw-araw."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"先生に いろいろな ことを <u>ならいました</u>。",c:["留いました","習いました","翌いました","翠いました"],a:1,
       exp:{ja:"「ならう（習う）」の かんじは「習（なら）う」です。「先生に ならう」は「先生に おしえてもらう・to learn from a teacher」という いみです。「留（とめる）」「翌（よく・つぎの）」「翠（みどり）」は ぜんぜん べつの かんじです。",
            tl:"Ang kanji ng 'narau (習う)' ay '習'. 'Sensei ni narau' = matuto mula sa guro. '留 (tomeru)' = ihinto, '翌 (yoku)' = sumunod na (araw), '翠 (midori)' = berde - ganap na magkakaibang kanji."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"休みの 日は いつもより <u>はやく</u> おきて、こうえんに 行きます。",c:["申く","早く","草く","旱く"],a:1,
       exp:{ja:"「はやく（早く）」の かんじは「早（はや）く」です。「はやく おきる」は「ふつうより まえの じかんに おきる・to get up early」という いみです。「早（はやい）」は じかんや あさの はやさです。「申（もうす）」「草（くさ）」「旱（ひでり）」は ちがう かんじです。",
            tl:"Ang kanji ng 'hayaku (早く)' ay '早'. 'Hayaku okiru' = gumising nang maaga. '早 (hayai)' = maagang oras. '申 (mousu)' = magsabi (magalang), '草 (kusa)' = damo, '旱 (hideri)' = tagtuyot - iba ang kahulugan."}}
    ]
  },
  {id:7,title:"買い物を しましょう",subtitle:"Shopping",icon:"🛍️",locked:false,
    questions:[
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"てんいんに（　）を もらいましたが、20円 足りませんでした。",c:["おいわい","おかし","おつり","おれい"],a:2,
       exp:{ja:"「おつり（お釣り）」は「おかねを はらったとき、おおすぎた ぶんが かえってくる おかね・change (money)」という いみです。「20えん たりなかった」は「おつりが 20えん すくなかった」という いみです。①おいわい＝celebration gift、②おかし＝sweets、④おれい＝thank-you gift は ちがいます。",
            tl:"Ang 'otsuri (お釣り)' ay nangangahulugang sukli o change (pera). 'Otsuri ga 20-en tarinakatta' = kulang ng 20 yen ang sukli. ①oiwai = regalo sa okasyon, ②okashi = merienda/matamis, ④orei = regalo sa pasasalamat."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"この 中で いちばん すきな いろを（　）ください。",c:["えらんで","かえて","くらべて","ならべて"],a:0,
       exp:{ja:"「えらぶ（選ぶ）」は「いくつかの なかから すきな ものを きめること・to choose/select」という いみです。「すきな いろを えらんで ください」は「どれか ひとつ きめて ください」という いみです。②かえて＝to change/exchange、③くらべて＝to compare、④ならべて＝to arrange/line up は ちがいます。",
            tl:"Ang 'erabu (選ぶ)' ay nangangahulugang pumili o choose/select. 'Suki na iro wo erande kudasai' = pakipili ng gusto mong kulay. ②kaete = palitan, ③kurabete = ikumpara, ④narabete = iayos/ihanay."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"その シャツ、いいですね。とても（　）いますよ。",c:["えらんで","くらべて","たりて","にあって"],a:3,
       exp:{ja:"「にあう（似合う）」は「ふくや いろが その ひとに よく みえること・to suit/look good on」という いみです。「シャツが にあっている」は「そのシャツを きると かっこいい・きれい」という いみです。①えらぶ＝choose、②くらべる＝compare、③たりる＝be enough は ちがいます。",
            tl:"Ang 'niau (似合う)' ay nangangahulugang bagay o suit/look good on someone. 'Shatsu ga niatte iru' = bagay ang kamiseta sa iyo. ①erabu = pumili, ②kuraberu = ikumpara, ③tariru = sapat - iba ang kahulugan."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"ぼうしを かぶって（　）で 見て みました。",c:["いす","かがみ","にもつ","はこ"],a:1,
       exp:{ja:"「かがみ（鏡）」は「じぶんの すがたや かおが みえる もの・mirror」という いみです。「ぼうしを かぶって かがみで みる」は「ぼうしが にあうか かがみで かくにんする」という いみです。①いす＝chair、③にもつ＝luggage、④はこ＝box は ちがいます。",
            tl:"Ang 'kagami (鏡)' ay nangangahulugang salamin o mirror. 'Boushi wo kabutte kagami de miru' = tingnan sa salamin kung bagay ang sombrero. ①isu = upuan, ③nimotsu = bagahe, ④hako = kahon."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"<u>あの 店は 毎日 えいぎょうして います。</u>",c:["あの 店は 毎日 あいて います。","あの 店は 毎日 おきゃくさんが たくさん 来ます。","あの 店は 毎日 おきゃくさんが ならんで います。","あの 店は 毎日 しまって います。"],a:0,
       exp:{ja:"「えいぎょう（営業）する」は「おみせが ひらいて、しごとを すること・to be open for business」という いみです。「えいぎょうしている＝あいている」で いみが おなじです。②はおきゃくの かずの はなし、③はならんでいる（べつの じょうたい）、④しまっている は はんたいの いみです。",
            tl:"Ang 'eigyou suru (営業する)' ay nangangahulugang bukas at nagtatrabaho ang tindahan. 'Eigyou shite iru = aite iru' - pareho ang kahulugan. ②tungkol sa bilang ng customers, ③nakahanay, ④sarado - kabaligtaran."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"<u>この パソコンは にほんせいです。</u>",c:["これは 日本で うって いる パソコンです。","これは 日本で 買った パソコンです。","これは 日本で つかう パソコンです。","これは 日本で つくった パソコンです。"],a:3,
       exp:{ja:"「にほんせい（日本製）」は「日本で つくった もの・made in Japan」という いみです。「〜せい（〜製）」は「〜で つくった」という いみです。「にほんせい＝日本で つくった」なので④が せいかいです。①うっている＝selling、②かった＝bought、③つかう＝use は ちがいます。",
            tl:"Ang 'nihonsei (日本製)' ay nangangahulugang gawa sa Japan. '～sei (～製)' = ginawa sa ～. Kaya ④'Nihon de tsukutta pasokon' = tamang sagot. ①binebenta sa Japan, ②binili sa Japan, ③ginagamit sa Japan - iba ang kahulugan."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「にあう」",c:["この 本は 小さい 子どもが 読むのに にあいます。","どの スカートが わたしに にあうでしょうか。","店の 中は かいものする 人で にあって いました。","わたしは この りょうりが とても にあいます。"],a:1,
       exp:{ja:"「にあう（似合う）」は「ふくや スタイルが その ひとに よく みえること・to suit a person」という いみです。②「どの スカートが わたしに にあうか」が ただしい つかいかたです。①は「むいている（向いている）」がただしい、③は「こんでいた（混んでいた）」がただしい、④は「きにいる（気に入る）」か「おいしい」がただしいです。",
            tl:"Ang 'niau (似合う)' ay bagay na damit o estilo sa isang tao. ②'Dono sukato ga watashi ni niau ka' = tamang gamit. ①dapat 'muite iru' (angkop para sa), ③dapat 'konde ita' (puno ng tao), ④dapat 'ki ni iru' o 'oishii' para sa pagkain."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「くらべる」",c:["子どもの とき、あには わたしに おもちゃを くらべました。","たくさんの 中から ほしい ものを 一つだけ くらべました。","2まいの シャツを くらべて、安い ほうを 買いました。","レジの 前に たくさんの 人が くらべて います。"],a:2,
       exp:{ja:"「くらべる（比べる）」は「2つ いじょうの ものを みて、ちがいを しらべること・to compare」という いみです。③「2まいの シャツを くらべて、やすい ほうを かった」が ただしい つかいかたです。①は「くれました」がただしい、②は「えらびました」がただしい、④は「ならんで」がただしいです。",
            tl:"Ang 'kuraberu (比べる)' ay nangangahulugang ikumpara o compare. ③'2-mai no shatsu wo kurabete, yasui hou wo katta' = tamang gamit. ①dapat 'kuremashita' (binigyan), ②dapat 'erabimashita' (pumili), ④dapat 'narande' (nakahanay)."}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"<u>夕方</u>、スーパーに 行って、やさいと にくを 買って きました。",c:["ゆうかた","ゆうがた","ゆかた","ゆがた"],a:1,
       exp:{ja:"「夕方（ゆうがた）」の ただしい よみかたです。「夕（ゆう）」＋「方（がた）」＝「ゆうがた」。「ゆうがた」は「ごごの おそい じかん・late afternoon/early evening」という いみです。「ゆかた（浴衣）」は なつに きる きもので ぜんぜん べつの ことばです。きをつけましょう！",
            tl:"Ang tamang pagbabasa ng '夕方' ay 'yuugata'. 'Yuu (夕)' + 'gata (方)' = 'yuugata'. Ibig sabihin: hapon/early evening. Mag-ingat: 'yukata (浴衣)' = damit na suot sa tag-init - ganap na iba."}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"<u>軽い</u> パソコンが ほしいです。",c:["うすい","かるい","はやい","やすい"],a:1,
       exp:{ja:"「軽い（かるい）」の ただしい よみかたです。「軽（かる）い」は「おもくない・not heavy/light」という いみです。「かるい パソコン」は「もちはこびが らくな パソコン」という いみです。①うすい＝thin（うすさ）、③はやい＝fast、④やすい＝cheap は ちがう いみです。",
            tl:"Ang tamang pagbabasa ng '軽い' ay 'karui'. Ibig sabihin: magaan o not heavy. 'Karui pasokon' = magaang na computer, madaling dalhin. ①usui = manipis, ③hayai = mabilis, ④yasui = mura - iba ang kahulugan."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"かどを まがると、<u>ほんや</u>が あります。",c:["本店","本屋","本室","本家"],a:1,
       exp:{ja:"「ほんや（本屋）」の かんじは「本（ほん）＋屋（や）」です。「〜や（〜屋）」は「〜を うる おみせ・shop/store」という いみです。「本屋＝本を うる おみせ・bookstore」です。「本店（ほんてん）」は「main store」、「本家（ほんけ）」は「main family/origin」で ちがいます。",
            tl:"Ang kanji ng 'honya (本屋)' ay '本屋'. '～ya (～屋)' = tindahan ng ～. 'Hon-ya = tindahan ng libro/bookstore'. '本店 (honten)' = pangunahing tindahan, '本家 (honke)' = pangunahing pamilya/pinagmulan - iba ang kahulugan."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"おかしは どこか、<u>てんいん</u>に 聞きました。",c:["店具","店員","店買","店業"],a:1,
       exp:{ja:"「てんいん（店員）」の かんじは「店（てん）＋員（いん）」です。「〜いん（〜員）」は「〜の ひと・member/staff」という いみです。「店員＝おみせで はたらく ひと・store clerk」です。「店具（てんぐ）」「店買（てんかい）」「店業（てんぎょう）」という ことばは ありません。",
            tl:"Ang kanji ng 'ten'in (店員)' ay '店員'. '～in (～員)' = miyembro/staff ng ～. 'Ten'in = nagtatrabaho sa tindahan/store clerk'. '店具', '店買', '店業' - hindi ito mga salita sa Hapon."}}
    ]
  },
  {id:8,title:"食事を しましょう（1）",subtitle:"Having meals 1",icon:"🍜",locked:false,
    questions:[
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"この 店で うって いる パンは とても（　）です。",c:["おとなしい","つよい","やわらかい","わかい"],a:2,
       exp:{ja:"「やわらかい（柔らかい）」は「かたくない・soft/tender」という いみです。「パンが やわらかい」は「パンが ふんわりして かたくない」という いみです。①おとなしい＝quiet/gentle（ひとの せいかく）、②つよい＝strong、④わかい＝young は パンの はなしには つかいません。",
            tl:"Ang 'yawarakai (柔らかい)' ay nangangahulugang malambot o soft/tender. 'Pan ga yawarakai' = malambot ang tinapay. ①otonashii = tahimik/banayad (para sa tao), ②tsuyoi = malakas, ④wakai = bata - hindi ginagamit para sa tinapay."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"（　）しかっても、むすこは やさいを 食べません。",c:["いくら","ちょうど","だんだん","やっと"],a:0,
       exp:{ja:"「いくら〜ても」は「どんなに〜しても、けっかが かわらない・no matter how much」という いみです。「いくら しかっても たべない」は「なんかい しかっても、ぜんぜん たべない」という いみです。②ちょうど＝just right/exactly、③だんだん＝gradually、④やっと＝finally/barely は ちがいます。",
            tl:"Ang 'ikura ～ temo' ay nangangahulugang kahit gaano pa/no matter how much. 'Ikura shikatte mo tabenai' = kahit paulit-ulit na pagsabihan, hindi pa rin kumakain. ②choudo = eksaktong, ③dandan = unti-unti, ④yatto = kahirap-hirap na sa wakas."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"おなかが いっぱいなので、ぜんぶ 食べるのは（　）です。",c:["きらい","ざんねん","へた","むり"],a:3,
       exp:{ja:"「むり（無理）」は「できない・impossible/unreasonable」という いみです。「おなかが いっぱい→ぜんぶ たべるのは むり」は「おなかが いっぱいで、もう たべられない」という いみです。①きらい＝don't like（すきじゃない）、②ざんねん＝disappointing、③へた＝not good at は ちがいます。",
            tl:"Ang 'muri (無理)' ay nangangahulugang imposible o hindi kayang gawin. 'Onaka ga ippai dakara zenbu taberu no wa muri' = puno na ang tiyan kaya imposibleng ubusing lahat. ①kirai = ayaw, ②zannen = nakakadismaya, ③heta = hindi magaling."}},
      {section:"問題１",instruction:"（　）に なにを いれますか。いちばん いい ものを ひとつ えらんで ください。",
       q:"この ぎゅうにゅうは へんな あじが（　）。",c:["あります","います","します","できます"],a:2,
       exp:{ja:"「あじが する」は「こういう あじが かんじられる・tastes like/has a taste」という いみです。「へんな あじが する」は「ふつうじゃない あじが する」という いみです。「あじがする・においがする・おとがする」は セットで おぼえましょう。①あります＝there is（もの）、②います＝there is（いきもの）、④できます＝can do は ちがいます。",
            tl:"Ang 'aji ga suru' ay nangangahulugang parang ganoon ang lasa. 'Hen na aji ga suru' = kakaibang lasa. Tandaan: 'aji ga suru', 'nioi ga suru', 'oto ga suru' - magkasamang aralin. ①arimasu = may (bagay), ②imasu = nandoon (buhay na bagay), ④dekimasu = kaya."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"<u>レストランは こんで いました。</u>",c:["レストランは あいて いました。","レストランは しまって いました。","レストランは おきゃくさんが たくさん いました。","レストランは おきゃくさんが 少なかったです。"],a:2,
       exp:{ja:"「こむ（混む）」は「ひとが たくさん いて、せまい かんじが すること・to be crowded」という いみです。「こんでいた＝おきゃくさんが たくさん いた」で いみが おなじです。①あいていた＝was open（えいぎょうの じょうたい）、②しまっていた＝was closed（はんたいの いみ）、④おきゃくさんが すくなかった は はんたいの いみです。",
            tl:"Ang 'komu (混む)' ay nangangahulugang maraming tao o crowded. 'Konde ita = okyakusan ga takusan ita' - pareho ang kahulugan. ①aite ita = bukas, ②shimatte ita = sarado (kabaligtaran), ④kaunting customer - kabaligtaran."}},
      {section:"問題２",instruction:"＿＿の ぶんと だいたい おなじ いみの ぶんが あります。いちばん いい ものを ひとつ えらんで ください。",
       q:"<u>いっしょに しょくじを しましょう。</u>",c:["いっしょに ごはんを 食べましょう。","いっしょに しょくどうで はたらきましょう。","いっしょに かいものを しましょう。","いっしょに 少し 休みましょう。"],a:0,
       exp:{ja:"「しょくじ（食事）する」は「ごはんを たべること・to have a meal」という いみです。「しょくじをしましょう＝いっしょに ごはんを たべましょう」で いみが おなじです。②しょくどうで はたらく＝はたらくことで ちがう、③かいものをする＝shopping、④すこし やすむ＝rest は ちがいます。",
            tl:"Ang 'shokuji suru (食事する)' ay nangangahulugang kumain ng pagkain o have a meal. 'Shokuji wo shimashou = gohan wo tabemashou' - pareho ang kahulugan. ②magtrabaho sa kainan, ③mamili, ④magpahinga - iba ang kahulugan."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「そろそろ」",c:["1時間いじょう かかって、そろそろ ゆうはんが できました。","おなかが すきましたから、そろそろ ごはんに しましょう。","いただいた おかしは そろそろ 食べて しまいました。","はじめは へたでしたが、そろそろ じょうずに なりました。"],a:1,
       exp:{ja:"「そろそろ」は「じかんが きて、そのことを はじめても いいころ・it is about time/soon」という いみです。②「おなかが すいた→そろそろ ごはんに しましょう」は「ちょうど いい じかんに なった」という いみで せいかいです。①は「とうとう/ようやく」がただしい、③は「ぜんぶ」がただしい、④は「だんだん/だいぶ」がただしいです。",
            tl:"Ang 'sorosoro' ay nangangahulugang 'oras na/it is about time'. ②'Onaka ga suita, sorosoro gohan ni shimashou' = gutom na, oras na kumain - tamang gamit. ①dapat 'you-ya-ku/to-utou', ③dapat 'zenbu', ④dapat 'dandan/daibu'."}},
      {section:"問題３",instruction:"つぎの ことばの つかいかたで いちばん いい ものを ひとつ えらんで ください。",
       q:"「かむ」",c:["かたい ものは よく かんで 食べましょう。","これは スプーンを かんで 食べます。","食べたい ものを じぶんの おさらに かんで ください。","りんごを ナイフで かんで、食べました。"],a:0,
       exp:{ja:"「かむ（噛む）」は「くちの なかで はを つかって たべものを こまかくすること・to chew/bite」という いみです。①「かたい ものは よく かんで たべる」が ただしい つかいかたです。②スプーンは かまずに つかう（ふつう「スプーンで すくう」）、③おさらに いれるのは「よそう（serve）」がただしい、④ナイフでは「きる（cut）」がただしいです。",
            tl:"Ang 'kamu (噛む)' ay nangangahulugang ngumuya o chew/bite. ①'Katai mono wa yoku kande taberu' = nguyain nang mabuti ang matitigas na pagkain - tamang gamit. ②hindi ngumuya ng kutsara (gumamit ng kutsara), ③dapat 'yosou' (magserve), ④dapat 'kiru' (gupitin ng kutsilyo)."}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"この <u>料理</u>の つくりかたを おしえて ください。",c:["りゅうり","りゅり","りょうり","りょり"],a:2,
       exp:{ja:"「料理（りょうり）」の ただしい よみかたです。「料（りょう）」＋「理（り）」＝「りょうり」。「りょう」は「りゅう」では ありません。「料理」は「たべものを つくること・cooking/dish」という いみです。「りょうりを する」「りょうりが じょうず」の ように つかいます。",
            tl:"Ang tamang pagbabasa ng '料理' ay 'ryouri'. 'Ryou (料)' + 'ri (理)' = 'ryouri'. Hindi 'ryuu' kundi 'ryou'. 'Ryouri' = pagluluto o lutuin. Halimbawa: 'ryouri wo suru' = magluto, 'ryouri ga jouzu' = mahusay magluto."}},
      {section:"問題４",instruction:"ひらがなで どう かきますか。ひとつ えらんで ください。",
       q:"どんな <u>味</u>が すきですか。",c:["あじ","いろ","もの","まち"],a:0,
       exp:{ja:"「味（あじ）」の ただしい よみかたです。「味（あじ）」は「たべものや のみものの あじ・taste/flavor」という いみです。「あまい（sweet）・からい（spicy）・すっぱい（sour）・しょっぱい（salty）」が「あじ」の しゅるいです。②いろ＝色（color）、③もの＝物（thing）、④まち＝街（town）は ちがいます。",
            tl:"Ang tamang pagbabasa ng '味' ay 'aji' = lasa o taste/flavor. 'Amai (matamis), karai (maanghang), suppai (maasim), shoppai (maalat)' - mga uri ng lasa. ②iro = kulay, ③mono = bagay, ④machi = lungsod - iba ang kahulugan."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"<u>しごと</u>が いそがしくて、ひるごはんが 食べられませんでした。",c:["仕事","仕理","仕堂","仕業"],a:0,
       exp:{ja:"「しごと（仕事）」の かんじは「仕（し）＋事（ごと）」です。「仕事」は「はたらくこと・work/job」という いみです。「仕理（しり）」「仕堂（しどう）」は にほんごに ないことばです。「仕業（しわざ）」は「した こと・deed/act」で べつの いみです。",
            tl:"Ang kanji ng 'shigoto (仕事)' ay '仕事'. '仕 (shi)' + '事 (goto)' = 'shigoto'. Ibig sabihin: trabaho o work. '仕理', '仕堂' - hindi ito mga salita sa Hapon. '仕業 (shiwaza)' = gawa/deed - iba ang kahulugan."}},
      {section:"問題５",instruction:"どう かきますか。ひとつ えらんで ください。",
       q:"この <u>にく</u>は とても やわらかいですね。",c:["内","西","肉","雨"],a:2,
       exp:{ja:"「にく（肉）」の かんじは「肉（にく）」です。「肉」は「たべる にくの こと・meat」という いみです。「牛肉（ぎゅうにく・beef）・豚肉（ぶたにく・pork）・鶏肉（とりにく・chicken）」も おぼえましょう。「内（うち）」「西（にし）」「雨（あめ）」は ぜんぜん ちがう かんじです。",
            tl:"Ang kanji ng 'niku (肉)' ay '肉' = karne o meat. Tandaan din: '牛肉 (gyuuniku)' = beef, '豚肉 (butaniku)' = baboy, '鶏肉 (toriniku)' = manok. '内 (uchi)' = loob, '西 (nishi)' = kanluran, '雨 (ame)' = ulan - ganap na magkakaiba."}}
    ]
  },
];

let currentLessonId=null, currentQuestionIdx=0, answers=[], answered=false;

function progressKey(){return 'jlpt_n4_progress_'+(learnerName||'default');}
function getProgress(){try{return JSON.parse(localStorage.getItem(progressKey())||'{}')}catch{return{}}}
function saveProgress(id,score,total){const p=getProgress();if(!p[id]||score>(p[id].score||0)){p[id]={score,total,done:true};localStorage.setItem(progressKey(),JSON.stringify(p))}}

function renderHome(){
  const el=document.getElementById('current-name-display');
  if(el)el.textContent=learnerName&&learnerName!=='（なまえなし）'?'👤 '+learnerName:'';
  const progress=getProgress();
  const doneCount=Object.keys(progress).length;
  document.getElementById('stat-done').textContent=doneCount;
  const scores=Object.values(progress).map(p=>Math.round(p.score/p.total*100));
  document.getElementById('stat-avg').textContent=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)+'%':'-';
  const container=document.getElementById('lesson-cards');
  container.innerHTML='';
  LESSONS.forEach(lesson=>{
    const p=progress[lesson.id];
    const isLocked=lesson.locked&&!p;
    const isDone=!!p;
    const pct=p?Math.round(p.score/p.total*100):null;
    const stars=pct!==null?(pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐'):'';
    const cls=isDone?'completed':(isLocked?'locked':'available');
    const badge=isDone?`<span class="lesson-badge badge-done">✓ ${pct}%</span>`:(isLocked?'<span class="lesson-badge badge-lock">🔒</span>':'<span class="lesson-badge badge-go">スタート</span>');
    const card=document.createElement('div');
    card.className='lesson-card '+cls;
    card.innerHTML=`<div class="lesson-icon">${lesson.icon}</div><div class="lesson-info"><div class="lesson-num">${lesson.id}回目</div><div class="lesson-title">${lesson.title}</div><div class="lesson-sub">${lesson.subtitle}</div>${stars?`<div class="score-stars">${stars}</div>`:''}</div>${badge}`;
    if(!isLocked&&!lesson.locked)card.onclick=()=>startLesson(lesson.id);
    container.appendChild(card);
  });
}

function startLesson(id){
  pendingLessonId=id;
  showScreen('name');
  document.getElementById('learner-name-input').value='';
  document.getElementById('learner-name-input').focus();
}

function confirmName(skip){
  const input=document.getElementById('learner-name-input').value.trim();
  if(!skip&&input){
    learnerName=input;
    localStorage.setItem('learnerName',learnerName);
  } else if(skip){
    learnerName='（なまえなし）';
  } else {
    document.getElementById('learner-name-input').style.borderColor='#ef4444';
    return;
  }
  if(pendingLessonId){
    _doStartLesson(pendingLessonId);
  } else {
    showScreen('home');
    renderHome();
  }
}

function _doStartLesson(id){
  currentLessonId=id;currentQuestionIdx=0;answers=[];answered=false;showScreen('quiz');renderQuestion();
}

function renderQuestion(){
  const lesson=LESSONS.find(l=>l.id===currentLessonId);
  const total=lesson.questions.length;
  const idx=currentQuestionIdx;
  const q=lesson.questions[idx];
  document.getElementById('quiz-lesson-name').textContent=`${lesson.id}回目 ${lesson.title}`;
  document.getElementById('quiz-progress-text').textContent=`${idx+1} / ${total}`;
  document.getElementById('progress-bar-fill').style.width=((idx/total)*100)+'%';
  const prevSection=idx>0?lesson.questions[idx-1].section:null;
  const showSection=q.section!==prevSection;
  let html='';
  if(showSection){html+=`<div class="section-label">${q.section}</div><div class="section-instruction">${q.instruction}</div>`;}
  const qHtml=q.q.replace(/<u>(.*?)<\/u>/g,'<span class="underline">$1</span>');
  html+=`<div class="question-card"><div class="question-text">${qHtml}</div><div class="choices" id="choices">`;
  q.c.forEach((c,i)=>{html+=`<button class="choice-btn" id="choice-${i}" onclick="selectAnswer(${i})"><span class="num">${i+1}</span><span>${c}</span></button>`;});
  html+=`</div></div>`;
  document.getElementById('quiz-body').innerHTML=html;
  answered=false;
}

function selectAnswer(chosen){
  if(answered)return;
  answered=true;
  const lesson=LESSONS.find(l=>l.id===currentLessonId);
  const q=lesson.questions[currentQuestionIdx];
  const correct=chosen===q.a;
  answers.push({correct,chosen,answer:q.a,question:q});
  document.querySelectorAll('.choice-btn').forEach(btn=>btn.disabled=true);
  document.getElementById('choice-'+chosen).classList.add('selected-answer');
  setTimeout(()=>nextQuestion(),600);
}

function nextQuestion(){
  const lesson=LESSONS.find(l=>l.id===currentLessonId);
  currentQuestionIdx++;
  if(currentQuestionIdx>=lesson.questions.length){showResult();}
  else{renderQuestion();window.scrollTo(0,0);}
}

function showResult(){
  const lesson=LESSONS.find(l=>l.id===currentLessonId);
  const total=answers.length;
  const score=answers.filter(a=>a.correct).length;
  const pct=Math.round(score/total*100);
  saveProgress(currentLessonId,score,total);
  showScreen('result');
  document.getElementById('result-emoji').textContent=pct>=90?'🏆':pct>=70?'🎉':'💪';
  document.getElementById('result-title').textContent=pct>=90?'すごい！パーフェクト！':pct>=70?'よく できました！':'がんばりましょう！';
  document.getElementById('result-subtitle').textContent=lesson.title;
  document.getElementById('result-score-num').textContent=score;
  document.getElementById('result-score-total').textContent='/ '+total;
  document.getElementById('result-stars').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  document.getElementById('result-msg').textContent=`${pct}%　せいかい`;
  document.getElementById('result-msg-sub').textContent=`${score}もん せいかい / ${total}もん`;
  const sections={};
  lesson.questions.forEach((q,i)=>{
    if(!sections[q.section])sections[q.section]={ok:0,ng:0};
    answers[i].correct?sections[q.section].ok++:sections[q.section].ng++;
  });
  let bHtml='';
  Object.entries(sections).forEach(([sec,data])=>{bHtml+=`<div class="breakdown-row"><span>${sec}</span><span><span class="breakdown-ok">✓ ${data.ok}</span>　<span class="breakdown-ng">✗ ${data.ng}</span></span></div>`;});
  document.getElementById('result-breakdown').innerHTML=bHtml;
  // 正解・不正解のレビューセクションを表示
  const correctAnswers=answers.filter(a=>a.correct);
  const wrongAnswers=answers.filter(a=>!a.correct);
  let rHtml='';
  // ✅ 正解した問題
  if(correctAnswers.length>0){
    rHtml+='<div class="review-header" style="color:#22c55e">✅ せいかい / Mga Tamang Sagot</div>';
    correctAnswers.forEach(a=>{
      const q=a.question;
      const qText=q.q.replace(/<u>(.*?)<\/u>/g,'<span class="underline">$1</span>');
      const qNum=answers.indexOf(a)+1;
      rHtml+=`<div class="review-card" style="border-left:4px solid #22c55e">
        <div class="review-qnum" style="color:#15803d">${q.section} · もんだい ${qNum}</div>
        <div class="review-qtext">${qText}</div>
        <div class="review-answers">
          <div class="review-ans correct-ans">✅ せいかい：${q.c[a.answer]}</div>
        </div>
      </div>`;
    });
  }
  // ❌ 間違えた問題（解説つき）
  if(wrongAnswers.length>0){
    rHtml+='<div class="review-header" style="margin-top:16px">❌ まちがえた もんだい / Mga Maling Sagot</div>';
    wrongAnswers.forEach(a=>{
      const q=a.question;
      const qText=q.q.replace(/<u>(.*?)<\/u>/g,'<span class="underline">$1</span>');
      const qNum=answers.indexOf(a)+1;
      rHtml+=`<div class="review-card" style="border-left:4px solid #ef4444">
        <div class="review-qnum">${q.section} · もんだい ${qNum}</div>
        <div class="review-qtext">${qText}</div>
        <div class="review-answers">
          <div class="review-ans wrong-ans">❌ あなたの こたえ：${q.c[a.chosen]}</div>
          <div class="review-ans correct-ans">✅ せいかい：${q.c[a.answer]}</div>
        </div>
        ${q.exp?`<div class="review-exp">
          <div class="review-exp-title" style="font-size:11px;font-weight:700;color:#92400e;margin-bottom:6px">📖 かいせつ / PALIWANAG</div>
          <div class="review-exp-ja">${q.exp.ja}</div>
          <div class="review-exp-tl"><div style="font-size:11px;font-weight:700;color:#1d4ed8;margin-bottom:3px">🇵🇭 Tagalog</div>${q.exp.tl}</div>
        </div>`:''}
      </div>`;
    });
  } else {
    rHtml+='<div class="review-header" style="color:#22c55e;margin-top:16px">🎉 ぜんもん せいかい！ Lahat tama!</div>';
  }
  document.getElementById('review-section').innerHTML=rHtml;

  // スプレッドシートに結果を送信
  const wrongNums=wrongAnswers.map(a=>answers.indexOf(a)+1).join(',');
  const params=new URLSearchParams({
    action:'quiz',
    learnerName:learnerName||'（なまえなし）',
    lessonId:currentLessonId,
    lessonTitle:lesson.title,
    score,
    total,
    pct,
    wrongNums:wrongNums||'なし'
  });
  fetch(PROXY_URL+'?'+params.toString())
    .then(r=>r.json())
    .then(()=>{
      const el=document.getElementById('save-status');
      if(el)el.textContent='✅ きろく ほぞん ずみ / Naitala na!';
    })
    .catch(()=>{});

  const nextL=LESSONS.find(l=>l.id===currentLessonId+1);
  const nb=document.getElementById('btn-next-lesson');
  if(nextL&&!nextL.locked){nb.style.display='block';nb.textContent=`つぎの レッスン（${nextL.id}回目）へ →`;}
  else{nb.style.display='none';}
}

function changeName(){
  learnerName='';
  localStorage.removeItem('learnerName');
  const el=document.getElementById('current-name-display');
  if(el)el.textContent='';
  showScreen('name');
  document.getElementById('learner-name-input').value='';
  document.getElementById('learner-name-input').focus();
}

function nextLesson(){const n=LESSONS.find(l=>l.id===currentLessonId+1);if(n&&!n.locked)startLesson(n.id);}
function retryLesson(){startLesson(currentLessonId);}
function goHome(){showScreen('home');renderHome();}
function showScreen(name){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(name+'-screen').classList.add('active');window.scrollTo(0,0);}

renderHome();
</script>
</body>
</html>
